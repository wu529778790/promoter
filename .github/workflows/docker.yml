name: Build and Deploy Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            CONTAINER="promoter"
            APP_DIR="/opt/1panel/apps/openresty/openresty/www/sites/promoter.shenzjd.com/index"

            # 确保应用目录存在
            sudo mkdir -p "$APP_DIR/config" "$APP_DIR/data" "$APP_DIR/logs"
            sudo chown -R $USER:$USER "$APP_DIR"

            # 拉取新镜像
            sudo docker pull "$IMAGE"

            # 停止并删除旧容器
            sudo docker stop "$CONTAINER" || true
            sudo docker rm "$CONTAINER" || true

            # 启动新容器
            sudo docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -v "$APP_DIR/config:/app/config" \
              -v "$APP_DIR/data:/app/data" \
              -v "$APP_DIR/logs:/app/logs" \
              -p 6701:3456 \
              "$IMAGE"

            # 清理旧镜像
            sudo docker image prune -f

            echo "✅ 部署完成: $CONTAINER"
