version: '3.8'

services:
  promoter:
    build: .
    image: ghcr.io/wu529778790/github-promoter:latest
    container_name: github-promoter
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6701:3456"   # Web 管理界面
    volumes:
      # 挂载配置文件
      - ./config:/app/config
      # 持久化数据（邮箱、进度、日志）
      - ./data:/app/data
      - ./logs:/app/logs
    # 启动 Web 管理界面
    command: ["node", "dist/server.js"]
