<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
          <path d="M9 18c-4.51 2-5-2-7-2"/>
        </svg>
      </div>
      <h1 class="login-title">Promoter</h1>
      <p class="login-subtitle">GitHub 邮箱采集与推广工具</p>
      <div id="login-content">
        <button class="btn btn-primary btn-login" onclick="githubLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub 登录
        </button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/>
          <path d="M9 18c-4.51 2-5-2-7-2"/>
        </svg>
        <span class="sidebar-brand">Promoter</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span>仪表盘</span>
        </a>
        <a href="#" class="nav-item" data-page="collect">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="m11 8-2 6 6-2"/></svg>
          <span>采集邮箱</span>
        </a>
        <a href="#" class="nav-item" data-page="send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
          <span>发送邮件</span>
        </a>
        <a href="#" class="nav-item" data-page="config">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>配置</span>
        </a>
        <a href="#" class="nav-item" data-page="logs">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
          <span>日志</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div id="user-area"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Dashboard -->
      <div id="page-dashboard" class="page active">
        <div class="page-header">
          <h1>仪表盘</h1>
          <span class="page-desc">项目概览与快速操作</span>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="stat-value" id="email-count">-</div>
            <div class="stat-label">已采集邮箱</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon accent">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
            </div>
            <div class="stat-value" id="sender-count">-</div>
            <div class="stat-label">发件人</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <div class="stat-value" id="combo-count">-</div>
            <div class="stat-label">邮件组合</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
            </div>
            <div class="stat-value" id="product-name">-</div>
            <div class="stat-label">当前产品</div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>来源统计</h2>
          </div>
          <div id="source-stats" class="source-stats"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>快速操作</h2>
          </div>
          <div class="quick-actions">
            <button class="btn btn-primary" onclick="quickCollect()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              开始采集
            </button>
            <button class="btn btn-accent" onclick="quickSend()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
              开始发送
            </button>
            <button class="btn btn-ghost" onclick="testSmtp()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
              测试连接
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>发件人</h2>
          </div>
          <div id="sender-list" class="sender-list"></div>
        </div>
      </div>

      <!-- Collect -->
      <div id="page-collect" class="page">
        <div class="page-header">
          <h1>采集邮箱</h1>
          <span class="page-desc">从 GitHub 仓库采集贡献者邮箱</span>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>指定仓库</h2>
          </div>
          <div class="form-group">
            <label class="form-label">GitHub 仓库</label>
            <input type="text" id="collect-repo" class="input" placeholder="owner/repo 或完整链接">
          </div>
          <button class="btn btn-primary" onclick="startCollect()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            开始采集
          </button>
          <div id="collect-status" class="status-msg"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>按配置采集</h2>
          </div>
          <p class="text-muted">根据 config.yaml 中配置的仓库列表和 Topic 自动采集</p>
          <button class="btn btn-primary" onclick="startCollectConfig()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            使用配置采集
          </button>
        </div>
      </div>

      <!-- Send -->
      <div id="page-send" class="page">
        <div class="page-header">
          <h1>发送邮件</h1>
          <span class="page-desc">批量发送推广邮件</span>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>发送设置</h2>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label class="form-label">限制数量</label>
              <input type="number" id="send-limit" value="0" class="input" placeholder="0 = 不限制">
            </div>
            <div class="form-group" style="flex:1">
              <label class="form-label">&nbsp;</label>
              <label class="checkbox-label">
                <input type="checkbox" id="send-dryrun">
                <span>模拟发送（不实际投递）</span>
              </label>
            </div>
          </div>
          <button class="btn btn-accent btn-lg" onclick="startSend()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            开始发送
          </button>
          <div id="send-status" class="status-msg"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>发送进度</h2>
          </div>
          <div id="send-progress" class="send-progress"></div>
        </div>
      </div>

      <!-- Config -->
      <div id="page-config" class="page">
        <div class="page-header">
          <h1>配置</h1>
          <span class="page-desc">环境变量与系统设置</span>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>.env 环境变量</h2>
            <button class="btn btn-ghost btn-sm" onclick="loadConfigPage()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
              重新加载
            </button>
          </div>
          <textarea id="config-editor" class="config-editor" rows="24" spellcheck="false"></textarea>
          <div class="config-actions">
            <button class="btn btn-primary" onclick="saveConfig()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              保存配置
            </button>
          </div>
          <div id="config-status" class="status-msg"></div>
        </div>
      </div>

      <!-- Logs -->
      <div id="page-logs" class="page">
        <div class="page-header">
          <h1>日志</h1>
          <span class="page-desc">运行日志与调试信息</span>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>最近日志</h2>
            <div class="header-actions">
              <label class="checkbox-label">
                <input type="checkbox" id="log-autorefresh" onchange="toggleLogAutoRefresh()">
                <span>自动刷新</span>
              </label>
              <button class="btn btn-ghost btn-sm" onclick="loadLogs()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                刷新
              </button>
            </div>
          </div>
          <div id="log-content" class="log-content"></div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
